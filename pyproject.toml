[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "/(dist|staticfiles)/"

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["dist", "staticfiles"]

[tool.ruff.lint]
select = [
  "E", "F", "I", "UP", "B",
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["brand", "config"]
